name: CI CD Backend
on:
  push:
    branches:
      - main
jobs:
  build-and-deploy:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout Code
        uses: actions/checkout@v3

      - name: Login to Docker Hub
        uses: docker/login-action@v2
        with:
          username: ${{ secrets.DOCKER_USERNAME }}
          password: ${{ secrets.DOCKER_PASSWORD }}

      - name: Build and Push Docker Image
        uses: docker/build-push-action@v4
        with:
          context: .
          push: true
          tags: vencce/backend-devops:${{ github.sha }}

      - name: Checkout GitOps Repository
        uses: actions/checkout@v3
        with:
          repository: Vencce/devops-gitops
          token: ${{ secrets.PAT_TOKEN }}
          path: gitops-repo

      - name: Update Image Tag in GitOps
        run: |
          cd gitops-repo
          sed -i "s|image: vencce/backend-devops:.*|image: vencce/backend-devops:${{ github.sha }}|g" backend.yaml
          git config user.name "github-actions"
          git config user.email "github-actions@github.com"
          git add backend.yaml
          git commit -m "Update backend image tag to ${{ github.sha }}"
          git push